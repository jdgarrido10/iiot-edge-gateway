# En tu repo
name: CI - IIoT Data Lake
'on':
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: src/worker/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/worker/requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run tests with coverage
        working-directory: src/worker
        run: |
          pytest tests/ \
            --cov=core \
            --cov=alerts \
            --cov=adapters \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=30 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: src/worker/coverage.xml
          retention-days: 7

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check src/worker/

      - name: Run Ruff formatter check
        run: ruff format --check src/worker/

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build edge_worker image
        uses: docker/build-push-action@v5
        with:
          context: src/worker
          file: src/worker/Dockerfile
          push: false
          tags: iiot-edge-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
